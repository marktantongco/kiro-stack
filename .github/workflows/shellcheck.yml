name: Shellcheck

on:
  push:
    branches: [main]
    paths:
      - "install.sh"
      - "test/*.sh"
  pull_request:
    branches: [main]
    paths:
      - "install.sh"
      - "test/*.sh"

permissions:
  contents: read

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandirs: ./
          additional_files: install.sh
